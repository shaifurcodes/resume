name: Compile All Resume Versions
on:
  push:
    branches:
      - main
jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      # 1. Compile the SWE Resume
      - name: Compile SWE Resume
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: generic/

      # 2. Compile the Robotics Resume
      - name: Compile Robotics Resume
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: robotics/

      # 3. Commit and Push all generated PDFs
      - name: Commit and Push Compiled PDFs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add generic/main.pdf
          git add robotics/main.pdf
          
          git commit -m "Automated Multi-PDF Compilation [skip ci]" || echo "No changes to commit"
          git push
