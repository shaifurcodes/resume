name: Compile LaTeX PDF and Commit to Repo

on:
  push:
    branches:
      - main  # Change to 'master' if your default branch is master

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex # Replace with your main .tex file name if it's different

      - name: Commit and Push Compiled PDF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add main.pdf # Replace with your output PDF name if needed
          git commit -m "Automated PDF Compilation [skip ci]" || echo "No changes to commit"
          git push